# Test config: in-memory H2 (MySQL-compatible mode) so tests run without a real MySQL server.
spring.datasource.url=jdbc:h2:mem:matest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# CORS origin is normally supplied via local/env config; provide a value so tests can boot.
cors.allowed-origin=http://localhost:3000
